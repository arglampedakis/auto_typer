name: build

# Builds the standalone Windows executable automatically.
#  * every push to main / PR  -> exe uploaded as a downloadable Actions artifact
#  * pushing a tag like v1.0.0 -> a GitHub Release is created with the exe attached
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write        # needed to create/attach releases on tag pushes

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build single-file exe
        run: pyinstaller --onefile --console --name autotyper --clean --noconfirm autotyper.py

      - name: Smoke test (import + launch, then stop)
        shell: pwsh
        run: |
          python -c "import ast; ast.parse(open('autotyper.py',encoding='utf-8').read()); print('syntax OK')"
          $p = Start-Process -FilePath dist\autotyper.exe -PassThru -WindowStyle Hidden
          Start-Sleep -Seconds 5
          if ($p.HasExited) { throw "exe exited early (code $($p.ExitCode))" }
          Stop-Process -Id $p.Id -Force
          Write-Host "exe launched and stayed running OK"

      - name: Upload exe as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: autotyper-exe
          path: dist/autotyper.exe

      - name: Attach exe to GitHub Release (on version tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/autotyper.exe
